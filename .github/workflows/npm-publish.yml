name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    env:
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Resolve npm dist-tag
        id: disttag
        run: |
          if echo "$TAG" | grep -qE '-(alpha|beta|rc)'; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml

      - name: Copy root README for npm
        run: cp ../README.md .

      - name: Set version from tag
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm publish --access public --tag ${{ steps.disttag.outputs.npm_tag }} --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
