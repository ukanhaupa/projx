name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      fastapi: ${{ steps.filter.outputs.fastapi }}
      fastify: ${{ steps.filter.outputs.fastify }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      e2e: ${{ steps.filter.outputs.e2e }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
            fastapi:
              - 'fastapi/**'
            fastify:
              - 'fastify/**'
            frontend:
              - 'frontend/**'
            mobile:
              - 'mobile/**'
            e2e:
              - 'e2e/**'
            infra:
              - 'infra/**'

  cli:
    name: CLI (lint + typecheck + build + test)
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npx eslint 'src/**/*.ts'
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test

  fastapi:
    name: FastAPI (format + lint)
    needs: changes
    if: needs.changes.outputs.fastapi == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run ruff format --check src tests
      - run: uv run ruff check src tests

  fastify:
    name: Fastify (format + lint + typecheck)
    needs: changes
    if: needs.changes.outputs.fastify == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastify
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: fastify/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: npx prettier --check .
      - run: npx eslint .
      - run: npx tsc --noEmit

  frontend:
    name: Frontend (format + lint + typecheck)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx prettier --check .
      - run: npx eslint 'src/**/*.{ts,tsx}'
      - run: npx tsc --noEmit

  mobile:
    name: Flutter (format + analyze)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart format --set-exit-if-changed .
      - run: dart analyze --fatal-infos

  e2e:
    name: E2E (format + lint + typecheck)
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
      - run: npx prettier --check .
      - run: npx eslint '**/*.ts'
      - run: npx tsc --noEmit

  infra:
    name: Terraform (fmt + validate)
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/stack
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.11'
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
