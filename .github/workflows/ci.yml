name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      fastapi: ${{ steps.filter.outputs.fastapi }}
      fastify: ${{ steps.filter.outputs.fastify }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      e2e: ${{ steps.filter.outputs.e2e }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
            fastapi:
              - 'fastapi/**'
            fastify:
              - 'fastify/**'
            frontend:
              - 'frontend/**'
            mobile:
              - 'mobile/**'
            e2e:
              - 'e2e/**'
            infra:
              - 'infra/**'

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cli:
    name: CLI (lint + typecheck + build + test + audit)
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v5
      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@projx.dev"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec eslint 'src/**/*.ts'
      - run: pnpm exec tsc --noEmit
      - run: pnpm build
      - run: pnpm test
      - run: pnpm audit --prod

  fastapi:
    name: FastAPI (format + lint + typecheck + test + audit)
    needs: changes
    if: needs.changes.outputs.fastapi == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run ruff format --check src tests
      - run: uv run ruff check src tests
      - run: uv run mypy
      - name: Enforce no private cross-module imports in src/
        run: |
          if grep -rEn 'from src\.[a-z_]+(\.[a-z_]+)?\._[a-z_]+ import' src/; then
            echo "❌ src/ files cannot import from another module's _-prefixed file. Import from the package."
            exit 1
          fi
      - run: uv run lint-imports
      - run: uv run pytest
      - run: uv run pip-audit

  fastify:
    name: Fastify (format + lint + typecheck + audit)
    needs: changes
    if: needs.changes.outputs.fastify == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastify
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: fastify/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint .
      - run: pnpm exec tsc --noEmit
      - run: pnpm audit --prod

  frontend:
    name: Frontend (format + lint + typecheck + audit)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint 'src/**/*.{ts,tsx}'
      - run: pnpm exec tsc --noEmit
      - run: pnpm audit --prod

  mobile:
    name: Flutter (format + analyze)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart format --set-exit-if-changed .
      - run: dart analyze --fatal-infos

  e2e:
    name: E2E (format + lint + typecheck + audit)
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: e2e/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint '**/*.ts'
      - run: pnpm exec tsc --noEmit
      - run: pnpm audit --prod

  infra:
    name: Terraform (fmt + validate)
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/stack
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.11'
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
