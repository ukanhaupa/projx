name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      fastapi: ${{ steps.filter.outputs.fastapi }}
      fastify: ${{ steps.filter.outputs.fastify }}
      express: ${{ steps.filter.outputs.express }}
      go: ${{ steps.filter.outputs.go }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      e2e: ${{ steps.filter.outputs.e2e }}
      infra: ${{ steps.filter.outputs.infra }}
      addons: ${{ steps.filter.outputs.addons }}
      features: ${{ steps.filter.outputs.features }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
            fastapi:
              - 'fastapi/**'
            fastify:
              - 'fastify/**'
            express:
              - 'express/**'
            go:
              - 'go/**'
            frontend:
              - 'frontend/**'
            mobile:
              - 'mobile/**'
            e2e:
              - 'e2e/**'
            infra:
              - 'infra/**'
            addons:
              - 'addons/**'
            features:
              - 'features/**'

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: python3 scripts/style-check.py frontend/src

  cli:
    name: CLI (lint + typecheck + build + test + audit)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@projx.dev"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint 'src/**/*.ts'
      - run: pnpm exec tsc --noEmit
      - run: pnpm build
      - run: pnpm test
      - run: pnpm audit --prod

  fastapi:
    name: FastAPI (format + lint + typecheck + audit)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.fastapi == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
      - run: uv sync --group dev
      - run: uv run ruff format --check src tests
      - run: uv run ruff check src tests
      - run: uv run mypy
      - name: Enforce no private cross-module imports in src/
        run: |
          if grep -rEn 'from src\.[a-z_]+(\.[a-z_]+)?\._[a-z_]+ import' src/ | grep -v 'pragma:.*allow-private-import'; then
            echo "❌ src/ files cannot import from another module's _-prefixed file. Import from the package, or add '# pragma: allow-private-import' on the line if the cycle makes a package import impossible."
            exit 1
          fi
      - run: uv run lint-imports
      - name: Audit Python dependencies
        run: |
          run_pip_audit() {
            for attempt in 1 2 3; do
              if bash audit.sh; then
                return 0
              fi
              if [ "$attempt" -eq 3 ]; then
                return 1
              fi
              sleep $((attempt * 5))
            done
          }
          run_pip_audit

  fastify:
    name: Fastify (format + lint + typecheck + audit)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.fastify == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastify
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: fastify/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint .
      - run: pnpm exec tsc --noEmit
      - run: pnpm audit --prod

  frontend:
    name: Frontend (format + lint + typecheck + audit)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint 'src/**/*.{ts,tsx}'
      - run: pnpm exec tsc --noEmit
      - run: pnpm audit --prod

  express:
    name: Express (format + lint + typecheck + build + test + audit)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.express == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_test
      JWT_SECRET: ci-test-secret # gitleaks:allow
      CRED_ENCRYPTION_KEY: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8= # gitleaks:allow
    defaults:
      run:
        working-directory: express
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: express/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint .
      - run: pnpm exec tsc --noEmit
      - run: pnpm build
      - run: pnpm exec vitest run --coverage
      - run: pnpm audit --prod

  go:
    name: Go (format + vet + lint + build + test + coverage)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_test
      JWT_SECRET: ci-test-secret # gitleaks:allow
      CRED_ENCRYPTION_KEY: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8= # gitleaks:allow
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum
      - run: go mod download
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - run: go vet ./...
      - run: go build ./...
      - name: golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v1.62.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...
      - run: go test -race -coverprofile=coverage.out -short ./...
      - run: bash scripts/check-coverage.sh

  mobile:
    name: Flutter (format + analyze + test + coverage)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart format --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      - run: flutter test --coverage
      - run: bash scripts/check-coverage.sh

  e2e:
    name: E2E (format + lint + typecheck + audit)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: e2e/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint '**/*.ts'
      - run: pnpm exec tsc --noEmit
      - run: pnpm audit --prod

  infra:
    name: Terraform (fmt + validate)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/stack
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.11"
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  scaffold-matrix:
    name: Scaffold matrix (${{ matrix.framework }}/${{ matrix.orm }})
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.addons == 'true' ||
      needs.changes.outputs.features == 'true' ||
      needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - framework: fastify
            orm: drizzle
          - framework: fastify
            orm: sequelize
          - framework: fastify
            orm: typeorm
          - framework: express
            orm: drizzle
          - framework: express
            orm: sequelize
          - framework: express
            orm: typeorm
          - framework: fastapi
            orm: none
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: cli
      - run: pnpm build
        working-directory: cli
      - if: matrix.framework == 'fastapi'
        uses: astral-sh/setup-uv@v3
      - if: matrix.framework == 'fastapi'
        working-directory: fastapi
        run: uv sync --group dev
      - run: scripts/ci-scaffold-matrix.sh ${{ matrix.framework }} ${{ matrix.orm }}
