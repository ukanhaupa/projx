services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastify_template
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: deps
    command: sh -c "pnpm prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastify_template?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma

  backend:
    build:
      context: .
      target: base
    command: sh -c "pnpm install && pnpm prisma generate && pnpm dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastify_template?schema=public
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: debug
      JWT_SECRET: dev-secret
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
