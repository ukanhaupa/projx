version: 0.2

phases:
  install:
    commands:
      - curl -sSL -o kubectl "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - install -m 0755 kubectl /usr/local/bin/kubectl
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

  pre_build:
    commands:
      - IMAGE_TAG="$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c1-7)"
      - if [ -z "$IMAGE_TAG" ]; then IMAGE_TAG="latest"; fi
      - SERVICE_NAME="backend"
      - DEFAULT_HEALTH_URL="http://localhost:7860/health"
      - LAST_DEPLOYED_COMMIT="$(aws ssm get-parameter --region "$CICD_REGION" --name "$DEPLOY_STATE_PARAM" --query 'Parameter.Value' --output text 2>/dev/null || true)"
      - SHOULD_DEPLOY="true"
      - |
        if [ -n "$LAST_DEPLOYED_COMMIT" ] && [ "$LAST_DEPLOYED_COMMIT" != "INITIAL" ] && [ -n "$CODEBUILD_RESOLVED_SOURCE_VERSION" ]; then
          CHANGED_PATHS="$(aws codecommit get-differences --region "$CICD_REGION" --repository-name "$CODECOMMIT_REPO_NAME" --before-commit-specifier "$LAST_DEPLOYED_COMMIT" --after-commit-specifier "$CODEBUILD_RESOLVED_SOURCE_VERSION" --query 'differences[].afterBlob.path' --output text || true)"
          CHANGED_PATHS="$CHANGED_PATHS $(aws codecommit get-differences --region "$CICD_REGION" --repository-name "$CODECOMMIT_REPO_NAME" --before-commit-specifier "$LAST_DEPLOYED_COMMIT" --after-commit-specifier "$CODEBUILD_RESOLVED_SOURCE_VERSION" --query 'differences[].beforeBlob.path' --output text || true)"
          if ! echo "$CHANGED_PATHS" | tr '\t' '\n' | grep -qE "^${FOLDER_PATH}/"; then
            SHOULD_DEPLOY="false"
          fi
        fi
      - echo "$SHOULD_DEPLOY" > /tmp/should_deploy
      - |
        if [ "$SHOULD_DEPLOY" = "true" ]; then
          aws ecr get-login-password --region "$TARGET_AWS_REGION" \
            | docker login --username AWS --password-stdin "$(echo "$ECR_REPOSITORY_URL" | cut -d/ -f1)"
          docker pull "$ECR_REPOSITORY_URL:latest" || true
          if [ -n "${RDS_DB_INSTANCE_IDENTIFIER:-}" ]; then
            SNAPSHOT_ID="${RDS_DB_INSTANCE_IDENTIFIER}-pre-deploy-$(date -u +%Y%m%d%H%M%S)"
            aws rds create-db-snapshot \
              --region "$TARGET_AWS_REGION" \
              --db-instance-identifier "$RDS_DB_INSTANCE_IDENTIFIER" \
              --db-snapshot-identifier "$SNAPSHOT_ID" \
              --tags "Key=Project,Value=$CODECOMMIT_REPO_NAME" "Key=Service,Value=$SERVICE_NAME"
            aws rds wait db-snapshot-available \
              --region "$TARGET_AWS_REGION" \
              --db-snapshot-identifier "$SNAPSHOT_ID"
          fi
        else
          echo "No changes in ${FOLDER_PATH}/. Skipping backend deploy."
        fi

  build:
    commands:
      - |
        if [ "$(cat /tmp/should_deploy)" = "true" ]; then
          export DOCKER_BUILDKIT=1
          DOCKER_STEP_TIMEOUT="${DOCKER_STEP_TIMEOUT:-10m}"
          timeout "$DOCKER_STEP_TIMEOUT" docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "$ECR_REPOSITORY_URL:latest" \
            -t "$ECR_REPOSITORY_URL:$IMAGE_TAG" fastapi
          trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed "$ECR_REPOSITORY_URL:$IMAGE_TAG"
          timeout "$DOCKER_STEP_TIMEOUT" docker push "$ECR_REPOSITORY_URL:$IMAGE_TAG"
          docker tag "$ECR_REPOSITORY_URL:$IMAGE_TAG" "$ECR_REPOSITORY_URL:latest"
          timeout "$DOCKER_STEP_TIMEOUT" docker push "$ECR_REPOSITORY_URL:latest"
        else
          echo "Skipping build phase."
        fi

  post_build:
    commands:
      - |
        set -Eeuo pipefail
        SERVICE_NAME="backend"
        DEFAULT_HEALTH_URL="http://localhost:7860/health"

        json_escape() {
          printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
        }

        notify_deploy() {
          local status="$1"
          if [ -z "${SLACK_DEPLOY_WEBHOOK:-}" ]; then
            return 0
          fi
          local message
          message="$SERVICE_NAME deploy $status for ${CODECOMMIT_REPO_NAME:-app} (${IMAGE_TAG:-unknown})"
          curl -fsS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$(json_escape "$message")\"}" \
            "$SLACK_DEPLOY_WEBHOOK" >/dev/null || true
        }

        health_check_url() {
          if [ -n "${DEPLOY_HEALTH_URL:-}" ]; then
            printf '%s' "$DEPLOY_HEALTH_URL"
          else
            printf '%s' "$DEFAULT_HEALTH_URL"
          fi
        }

        run_health_check() {
          local url status
          url="$(health_check_url)"
          for attempt in 1 2 3 4 5; do
            status="$(curl -kfsSL -o /dev/null -w '%{http_code}' "$url" 2>/tmp/backend-health.err || true)"
            case "$status" in
              2*|3*) echo "Backend health check OK ($status)"; return 0 ;;
            esac
            echo "Backend health check attempt $attempt failed: HTTP ${status:-000}"
            sleep $((attempt * 5))
          done
          return 1
        }

        trap 'notify_deploy failed' ERR

        if [ "$(cat /tmp/should_deploy)" != "true" ]; then
          echo "Skipping deploy phase."
          notify_deploy skipped
          exit 0
        fi

        if [ -n "$EKS_CLUSTER_NAME" ]; then
          aws eks update-kubeconfig --region "$TARGET_AWS_REGION" --name "$EKS_CLUSTER_NAME"
          kubectl -n "$APPS_NAMESPACE" set image deployment/backend backend="$ECR_REPOSITORY_URL:$IMAGE_TAG"
          kubectl -n "$APPS_NAMESPACE" rollout status deployment/backend --timeout=300s
          if [ -n "${DEPLOY_HEALTH_URL:-}" ]; then
            run_health_check
          fi
        else
          INSTANCE_IDS="$(aws ec2 describe-instances \
            --region "$TARGET_AWS_REGION" \
            --filters "Name=tag:Name,Values=$COMPOSE_INSTANCE_TAG" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)"
          if [ -z "$INSTANCE_IDS" ]; then
            echo "ERROR: No running compose instance found with tag Name=$COMPOSE_INSTANCE_TAG"
            exit 1
          fi
          INSTANCE_ID="$(echo "$INSTANCE_IDS" | awk '{print $1}')"
          REMOTE_HEALTH_URL="$(health_check_url)"
          ECR_REGISTRY="$(echo "$ECR_REPOSITORY_URL" | cut -d/ -f1)"
          REMOTE_COMMAND="$(printf '%s\n' \
            'set -Eeuo pipefail' \
            "aws ecr get-login-password --region \"$TARGET_AWS_REGION\" | docker login --username AWS --password-stdin \"$ECR_REGISTRY\"" \
            'docker-compose -f /opt/docker-compose.yml pull backend' \
            'docker-compose -f /opt/docker-compose.yml up -d --no-deps backend' \
            'healthy=false' \
            'for attempt in 1 2 3 4 5; do' \
            "  status=\$(curl -kfsSL -o /dev/null -w '%{http_code}' \"$REMOTE_HEALTH_URL\" 2>/tmp/backend-health.err || true)" \
            '  case "$status" in' \
            '    2*|3*) echo "Backend health check OK ($status)"; healthy=true; break ;;' \
            '  esac' \
            '  echo "Backend health check attempt $attempt failed: HTTP ${status:-000}"' \
            '  sleep $((attempt * 5))' \
            'done' \
            'if [ "$healthy" != "true" ]; then' \
            '  exit 1' \
            'fi' \
            'keep_count="${COMPOSE_KEEP_IMAGE_COUNT:-5}"' \
            "docker images \"$ECR_REPOSITORY_URL\" --format '{{.ID}}' | awk -v keep=\"\$keep_count\" 'NR > keep { print }' | sort -u | xargs -r docker rmi || true" \
            'docker image prune --filter "until=168h" -f || true')"
          COMMAND_ID="$(aws ssm send-command \
            --region "$TARGET_AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="$REMOTE_COMMAND" \
            --query 'Command.CommandId' \
            --output text)"
          echo "SSM command sent: $COMMAND_ID; waiting for completion..."
          aws ssm wait command-executed \
            --region "$TARGET_AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || \
          (aws ssm get-command-invocation \
            --region "$TARGET_AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' \
            --output text && exit 1)
        fi

        aws ssm put-parameter --region "$CICD_REGION" --name "$DEPLOY_STATE_PARAM" --type String \
          --value "$CODEBUILD_RESOLVED_SOURCE_VERSION" --overwrite
        notify_deploy succeeded
