title = "projx gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Honour inline pragma markers, known non-secret value formats, and per-template test fixtures"
regexTarget = "line"
regexes = [
  '''pragma:\s*allowlist\s*secret''',
  '''gitleaks:allow''',
  # Cocoapods SPEC CHECKSUMS / Manifest.lock — 40-char SHA1 of pod source.
  # Public, deterministic, autogenerated by `pod install`; not a secret.
  '''(?m)^\s+[A-Za-z_][A-Za-z0-9_.+/\-]*:\s+[a-f0-9]{40}\s*$''',
  # Terraform `password = random_password.X.Y.result` — the actual secret is a
  # provider-generated random value, not a literal in source.
  '''random_password\..*\.result''',
  # Kubernetes Secret reference field-names (the literal is a *key name* inside
  # a referenced Secret, not the secret value itself).
  '''(passwordSecretKey|existingSecretPasswordKey)\s*=''',
]
paths = [
  # Test-only deterministic fixtures used by CI to exercise crypto round-trips.
  # These keys are committed deliberately; rotating them breaks the test suite.
  '''.*/\.env\.test$''',
  # Laravel loads .env.testing when APP_ENV=testing; committed test fixture.
  '''.*/\.env\.testing$''',
  # Build artefacts (regenerable, never committed) — copies of *.test.ts.
  '''.*/dist/.*''',
  # Next.js build output + coverage artefacts (regenerable, gitignored).
  '''.*/\.next/.*''',
  '''.*/coverage/.*''',
  '''.*/\.nyc_output/.*''',
  # Terraform module cache (downloaded by `terraform init`, not committed).
  '''.*/\.terraform/.*''',
  # Local environment files (gitignored; on-disk only for the operator).
  '''.*/\.env\.(local|dev|staging|prod)$''',
  # Auth-feature test fixtures: deterministic test passwords / TOTP secrets.
  '''features/auth/.*/tests/.*''',
  '''(fastify|express|fastapi|vitejs|nextjs)/tests/.*''',
  # Admin-panel Go test fixtures (deterministic keys/TOTP secrets; no real secrets).
  '''admin-panel/.*_test\.go$''',
  # IaC reference module READMEs that quote example provider configs.
  '''.*/\.terraform/modules/.*''',
]
