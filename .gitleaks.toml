title = "projx gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Honour inline pragma markers, known non-secret value formats, and per-template test fixtures"
regexTarget = "line"
regexes = [
  '''pragma:\s*allowlist\s*secret''',
  '''gitleaks:allow''',
  # Cocoapods SPEC CHECKSUMS / Manifest.lock — 40-char SHA1 of pod source.
  # Public, deterministic, autogenerated by `pod install`; not a secret.
  '''(?m)^\s+[A-Za-z_][A-Za-z0-9_.+/\-]*:\s+[a-f0-9]{40}\s*$''',
]
paths = [
  # Test-only deterministic fixtures used by CI to exercise crypto round-trips.
  # These keys are committed deliberately; rotating them breaks the test suite.
  '''.*/\.env\.test$''',
]
